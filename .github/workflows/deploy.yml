name: Deploy QMA to Vercel Production
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Deploy to Vercel (production)
        run: |
          T="${{ secrets.VERCEL_TOKEN }}"
          echo "=== whoami ==="; vercel whoami --token="$T" 2>&1 || true
          echo "=== teams ==="; vercel teams ls --token="$T" 2>&1 || true
          echo "=== projects (team scope) ==="; vercel project ls --token="$T" --scope=georgejetson-claudes-projects 2>&1 | head -15 || true
          echo "=== DEPLOY (team scope) ==="
          vercel deploy --prod --yes --token="$T" --scope=georgejetson-claudes-projects 2>&1
