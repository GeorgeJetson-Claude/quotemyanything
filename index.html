<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote My Anything - Get Free Quotes from Local Pros</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .hero { background: #007bff; color: white; padding: 60px 20px; text-align: center; }
        .disclaimer { background: #f8f9fa; padding: 20px; margin: 20px; border-left: 4px solid #ffc107; }
        form { max-width: 600px; margin: 40px auto; padding: 20px; }
        select, input, textarea { width: 100%; margin: 10px 0; padding: 10px; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Get Multiple Free Quotes for Any Home Service</h1>
        <p>We connect you with local professionals — we don’t do the work ourselves.</p>
        <div class="disclaimer">
            <strong>Important:</strong> Quote My Anything connects homeowners with independent local service providers. We are not a contractor.
        </div>
        
        <!-- Service Selector -->
        <select id="serviceSelector" onchange="prefillService()">
            <option value="">Select a Service</option>
            <option value="roofing">Roofing</option>
            <option value="hvac">HVAC / Heating & Cooling</option>
            <option value="plumbing">Plumbing</option>
            <option value="cleaning">House Cleaning</option>
            <option value="landscaping">Landscaping</option>
            <option value="painting">Painting</option>
            <option value="electrical">Electrical</option>
            <!-- Add more as needed -->
        </select>
        <button onclick="goToForm()">Get Quotes Now</button>
    </div>

    <form id="quick-form">
        <h2>Quick Quote Request</h2>
        <input type="hidden" id="source" name="source" value="qma-home">
        <select id="service" name="service" required>
            <!-- Populated by selector -->
        </select>
        <input type="text" id="zip" name="zip" placeholder="Zip Code" required>
        <input type="email" id="email" name="email" placeholder="Your Email" required>
        <textarea id="project_details" name="project_details" placeholder="Describe your project..." required></textarea>
        <label><input type="checkbox" required> I consent to being contacted by local pros.</label>
        <button type="submit">Get Free Quotes</button>
    </form>

    <script>
        function prefillService() {
            const sel = document.getElementById('serviceSelector').value;
            if (sel) document.getElementById('service').value = sel;
        }
        function goToForm() {
            document.getElementById('quick-form').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
